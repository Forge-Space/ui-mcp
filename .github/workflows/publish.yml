name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps
      - run: npm run registry:check
      - run: npm run validate:all

  publish:
    name: Publish npm package and MCP metadata
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps
      - run: npm run build

      - name: Check if version already on npm
        id: npm-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Use unauthenticated curl to avoid scoped-package auth issues
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://registry.npmjs.org/@forgespace%2fui-mcp/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::v${VERSION} already on npm — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.already_published == 'false'
        run: |
          VERSION="${{ steps.npm-check.outputs.version }}"
          # Attempt publish; npm may return E403 even on success (provenance race condition)
          if npm publish --provenance --access public; then
            echo "::notice::Published @forgespace/ui-mcp@${VERSION} to npm"
          else
            # E403 "cannot publish over" = version already published (race condition or retry)
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://registry.npmjs.org/@forgespace%2fui-mcp/${VERSION}")
            if [ "$STATUS" = "200" ]; then
              echo "::warning::npm returned E403 but v${VERSION} is live — treating as success"
            else
              echo "::error::npm publish failed and v${VERSION} is not on the registry"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

  release:
    name: Create GitHub release
    needs: publish
    if: always() && needs.publish.result != 'cancelled' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true

name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps
      - run: npm run registry:check
      - run: npm run validate:all

  publish:
    name: Publish npm package and MCP metadata
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci --legacy-peer-deps
      - run: npm run build

      - name: Publish to npm
        id: npm-publish
        continue-on-error: true
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check npm publish result
        run: |
          if [ "${{ steps.npm-publish.outcome }}" = "failure" ]; then
            VERSION=$(node -p "require('./package.json').version")
            # Check if version already exists on npm (not a real failure)
            if npm view "@forgespace/ui-mcp@${VERSION}" version 2>/dev/null; then
              echo "::warning::npm already has v${VERSION} — skipping publish"
            else
              echo "::error::npm publish failed for a reason other than duplicate version"
              exit 1
            fi
          fi

      - name: Install MCP publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

  release:
    name: Create GitHub release
    needs: publish
    if: always() && needs.publish.result != 'cancelled' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
